<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이미지 기반 턴제 격투 게임</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #111; color: #fff; text-align: center; margin: 0; }
        
        /* 공통 스타일 */
        .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        .active { display: block; }

        /* --- 1. 캐릭터 선택 화면 --- */
        #select-screen { background: linear-gradient(to bottom, #222, #000); padding-top: 50px; }
        .char-container { display: flex; justify-content: center; gap: 30px; margin-top: 50px; }
        .char-card { border: 4px solid #555; border-radius: 10px; cursor: pointer; transition: 0.3s; width: 220px; padding: 15px; background: #333; }
        .char-card:hover { transform: scale(1.05); border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        .char-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; background: #222; }
        .char-card h3 { margin: 15px 0 5px; color: #f1c40f; }
        .char-card p { font-size: 0.9em; color: #ccc; margin: 5px 0 0; }

        /* --- 2. 전투 화면 --- */
        /* 배경 이미지 적용 */
        #battle-screen { 
            background-image: url('images/battle_bg.png'); 
            background-size: cover; 
            background-position: center; 
        }
        
        /* 전투 UI 설정 */
        .battle-layout { display: flex; justify-content: space-between; align-items: flex-end; height: 65%; padding: 0 100px 50px; }
        .char-display { text-align: center; width: 250px; }
        .char-display h3 { background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px; margin-bottom: 10px; }
        
        /* HP 바 */
        .hp-bar-bg { width: 100%; height: 25px; background: #444; border: 2px solid #000; border-radius: 5px; overflow: hidden; margin-top: 15px; box-shadow: 0 0 5px #000; }
        .hp-bar-fill { height: 100%; background: #e74c3c; width: 100%; transition: width 0.3s; }

        /* 캐릭터 이미지 설정 */
        .char-img { width: 100%; height: 250px; object-fit: contain; transition: transform 0.2s; filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.8)); }
        
        /* 피격 및 공격 애니메이션 */
        @keyframes shake { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(3px, -3px); } }
        .damaged { animation: shake 0.3s; animation-iteration-count: 2; filter: brightness(2) sepia(1) hue-rotate(-50deg) drop-shadow(0 0 10px red); }
        .attacking-p { transform: translateX(50px) scale(1.1); }
        .attacking-e { transform: translateX(-50px) scale(1.1); }

        /* 하단 컨트롤러 */
        #controls { height: 35%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; border-top: 4px solid #555; }
        #combat-log { font-size: 1.2em; color: #ddd; margin-bottom: 20px; height: 35px; font-weight: bold; }
        .btn-group { display: flex; gap: 15px; }
        button { padding: 15px 30px; font-size: 1.2em; cursor: pointer; border: 3px solid transparent; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:hover:not(:disabled) { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255,255,255,0.3); }
        .btn-atk { background: #e74c3c; color: white; border-color: #c0392b; }
        .btn-grd { background: #3498db; color: white; border-color: #2980b9; }
        .btn-thr { background: #f1c40f; color: black; border-color: #f39c12; }
        button:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(100%); }
    </style>
</head>
<body>

    <div id="select-screen" class="screen active">
        <h1>캐릭터를 선택하세요</h1>
        <div class="char-container">
            <div class="char-card" onclick="selectCharacter('warrior')">
                <img src="images/warrior.png" alt="화염 전사">
                <h3>화염 전사</h3>
                <p>공격 시 추가 데미지 (+5)</p>
                <p>상성: [공격] 특화</p>
            </div>
            <div class="char-card" onclick="selectCharacter('knight')">
                <img src="images/knight.png" alt="강철 기사">
                <h3>강철 기사</h3>
                <p>방어 시 반사 데미지 (4)</p>
                <p>상성: [방어] 특화</p>
            </div>
        </div>
    </div>

    <div id="battle-screen" class="screen">
        <div class="battle-layout">
            <div class="char-display">
                <h3 id="p-name">플레이어</h3>
                <img id="p-img" class="char-img" src="" alt="플레이어">
                <div class="hp-bar-bg"><div id="p-hp-fill" class="hp-bar-fill"></div></div>
            </div>

            <h1 style="font-size: 4em; color: #f1c40f; text-shadow: 2px 2px 5px #000;">VS</h1>

            <div class="char-display">
                <h3 id="e-name">컴퓨터</h3>
                <img id="e-img" class="char-img" src="" alt="적">
                <div class="hp-bar-bg"><div id="e-hp-fill" class="hp-bar-fill"></div></div>
            </div>
        </div>

        <div id="controls">
            <div id="combat-log">전투 시작! 행동을 선택하세요.</div>
            <div class="btn-group">
                <button class="btn-atk" onclick="playTurn('공격')">공격 (가위)</button>
                <button class="btn-grd" onclick="playTurn('방어')">방어 (바위)</button>
                <button class="btn-thr" onclick="playTurn('잡기')">잡기 (보)</button>
            </div>
        </div>
    </div>

    <script>
        // 캐릭터 데이터 (로컬 이미지 경로 적용)
        const charData = {
            warrior: {
                name: "화염 전사", hp: 100, maxHp: 100,
                sprite: "images/warrior.png", 
                traits: { attackBonus: 5, guardReflect: 0 }
            },
            knight: {
                name: "강철 기사", hp: 100, maxHp: 100,
                sprite: "images/knight.png", 
                traits: { attackBonus: 0, guardReflect: 4 }
            }
        };

        let player = {};
        let enemy = {};
        const baseDamage = 15;
        let isPlayerTurn = true;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function selectCharacter(charId) {
            player = JSON.parse(JSON.stringify(charData[charId]));
            const enemyId = charId === 'warrior' ? 'knight' : 'warrior';
            enemy = JSON.parse(JSON.stringify(charData[enemyId]));
            enemy.name = "타락한 " + enemy.name;

            document.getElementById('p-name').innerText = player.name;
            document.getElementById('p-img').src = player.sprite;
            document.getElementById('e-name').innerText = enemy.name;
            document.getElementById('e-img').src = enemy.sprite;
            updateHP();

            showScreen('battle-screen');
            log("전투가 시작되었습니다! 기술을 선택하세요.");
        }

        function updateHP() {
            document.getElementById('p-hp-fill').style.width = (player.hp / player.maxHp * 100) + '%';
            document.getElementById('e-hp-fill').style.width = (enemy.hp / enemy.maxHp * 100) + '%';
        }

        function log(msg) {
            document.getElementById('combat-log').innerText = msg;
        }

        function triggerVisual(target, effectClass) {
            const element = document.getElementById(target + '-img');
            element.classList.add(effectClass);
            setTimeout(() => element.classList.remove(effectClass), 500);
        }

        function setButtons(enable) {
            document.querySelectorAll('#controls button').forEach(b => b.disabled = !enable);
        }

        function checkMatchup(pAction, eAction) {
            if (pAction === eAction) return 'draw';
            if ((pAction === '공격' && eAction === '잡기') || (pAction === '방어' && eAction === '공격') || (pAction === '잡기' && eAction === '방어')) return 'win';
            return 'lose';
        }

        function playTurn(playerAction) {
            if (!isPlayerTurn || player.hp <= 0 || enemy.hp <= 0) return;
            setButtons(false);

            const actions = ['공격', '방어', '잡기'];
            const enemyAction = actions[Math.floor(Math.random() * 3)];
            
            log(`나: [${playerAction}] vs 적: [${enemyAction}]`);
            const result = checkMatchup(playerAction, enemyAction);

            if (result === 'win') triggerVisual('p', 'attacking-p');
            if (result === 'lose') triggerVisual('e', 'attacking-e');

            setTimeout(() => {
                if (result === 'draw') {
                    log("서로의 기술이 무효화되었습니다!");
                } else if (result === 'win') {
                    let dmg = baseDamage;
                    if (playerAction === '공격') dmg += player.traits.attackBonus;
                    enemy.hp = Math.max(0, enemy.hp - dmg);
                    log(`승리! 적에게 ${dmg}의 피해를 입혔습니다!`);
                    triggerVisual('e', 'damaged');
                } else {
                    let dmg = baseDamage;
                    if (enemyAction === '공격') dmg += enemy.traits.attackBonus;
                    
                    if (playerAction === '방어' && player.traits.guardReflect > 0) {
                        enemy.hp = Math.max(0, enemy.hp - player.traits.guardReflect);
                        log(`적의 공격을 막고 ${player.traits.guardReflect}의 반사 피해를 주었습니다!`);
                        triggerVisual('e', 'damaged');
                    }
                    
                    player.hp = Math.max(0, player.hp - dmg);
                    if(playerAction !== '방어') log(`패배! 적에게 ${dmg}의 피해를 입었습니다!`);
                    triggerVisual('p', 'damaged');
                }

                updateHP();

                if (enemy.hp <= 0) {
                    log("🏆 전투에서 승리하셨습니다!!");
                } else if (player.hp <= 0) {
                    log("💀 전투에서 패배하셨습니다...");
                } else {
                    setTimeout(() => {
                        isPlayerTurn = true;
                        setButtons(true);
                        log("다시 당신의 턴입니다.");
                    }, 500);
                }
            }, 300);
        }
    </script>
</body>
</html>
